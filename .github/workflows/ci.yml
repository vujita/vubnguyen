name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

# You can leverage Vercel Remote Caching with Turbo to speed up your builds
# @link https://turborepo.org/docs/core-concepts/remote-caching#remote-caching-on-vercel-builds
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  DATABASE_URL: ${{ secrets.DATABASE_PREVIEW_URL }}
  CI: true
  SKIP_ENV_VALIDATION: 1

jobs:
  build-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install deps (with cache)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm turbo run build

      - name: Type-check
        run: pnpm turbo run type-check

      - name: Test
        run: pnpm turbo run test

      - name: Check workspaces
        run: pnpm manypkg check

  lint:
    runs-on: ubuntu-latest
    needs: build-lint
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install deps (with cache)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm turbo run lint

      - name: Check prettier
        run: pnpm run check

  dispatch-auto-fix:
    runs-on: ubuntu-latest
    needs: lint
    if: failure() && needs.lint.result == 'failure'
    permissions:
      actions: write

    steps:
      - name: Dispatch auto-fix workflow
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const branch =
              context.payload.pull_request?.head?.ref ??
              context.ref.replace('refs/heads/', '');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-fix-lint-prettier.yml',
              ref: context.payload.repository.default_branch,
              inputs: { branch },
            });
            core.info(`Dispatched auto-fix workflow for branch: ${branch}`);
