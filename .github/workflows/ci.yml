name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

# You can leverage Vercel Remote Caching with Turbo to speed up your builds
# @link https://turborepo.org/docs/core-concepts/remote-caching#remote-caching-on-vercel-builds
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  DATABASE_URL: ${{ secrets.DATABASE_PREVIEW_URL }}
  CI: true
  SKIP_ENV_VALIDATION: 1

jobs:
  build-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      lint-failed: ${{ steps.lint-outcome.outputs.failed }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install deps (with cache)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm turbo run build

      - name: Lint
        id: lint
        run: pnpm turbo run lint
        continue-on-error: true

      - name: Capture lint outcome
        id: lint-outcome
        if: always()
        run: echo "failed=${{ steps.lint.outcome == 'failure' }}" >> $GITHUB_OUTPUT

      - name: Type-check
        run: pnpm turbo run type-check

      - name: Test
        run: pnpm turbo run test

      - name: Check workspaces
        run: pnpm manypkg check

      - name: Check prettier
        run: pnpm run check

      - name: Fail if lint failed
        if: always() && steps.lint.outcome == 'failure'
        run: exit 1

  auto-fix-lint:
    runs-on: ubuntu-latest
    needs: build-lint
    if: |
      always() &&
      needs.build-lint.outputs.lint-failed == 'true' &&
      github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install deps (with cache)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run lint fix
        run: pnpm lint:fix
        continue-on-error: true

      - name: Run prettier format
        run: pnpm format
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create fix branch and open PR
        if: steps.changes.outputs.has-changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          FIX_BRANCH="auto-fix/lint-pr-${PR_NUMBER}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If the fix branch already exists remotely, update it instead of creating a new PR
          if git ls-remote --exit-code origin "${FIX_BRANCH}" > /dev/null 2>&1; then
            git checkout -b "${FIX_BRANCH}" "origin/${FIX_BRANCH}" 2>/dev/null || git checkout -b "${FIX_BRANCH}"
            git add -A
            git commit -m "fix: auto-fix lint errors for PR #${PR_NUMBER}"
            git push origin "${FIX_BRANCH}"
            echo "Updated existing fix branch ${FIX_BRANCH}"
          else
            git checkout -b "${FIX_BRANCH}"
            git add -A
            git commit -m "fix: auto-fix lint errors for PR #${PR_NUMBER}"
            git push -u origin "${FIX_BRANCH}"

            gh pr create \
              --base "${{ github.head_ref }}" \
              --head "${FIX_BRANCH}" \
              --title "fix: auto-fix lint errors for PR #${PR_NUMBER}" \
              --body "$(printf 'This PR automatically applies lint and Prettier fixes for #%s.\n\nMerge this into your branch to resolve the lint failures in CI.' "${PR_NUMBER}")"
          fi

      - name: No lint fixes needed
        if: steps.changes.outputs.has-changes == 'false'
        run: echo "Lint failed but no auto-fixable changes were produced. Manual fixes required."
